<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inquiries | Kalam Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fb;
}

.sidebar{
position:fixed;
width:250px;
height:100vh;
background:#0f172a;
color:white;
padding:30px 20px;
}

.sidebar h2{
text-align:center;
margin-bottom:40px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px;
margin:10px 0;
border-radius:10px;
}

.sidebar a:hover{
background:#2563eb;
}

.main{
margin-left:250px;
padding:30px;
}

.header{
margin-bottom:25px;
}

.inquiry-card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.inquiry-card h3{
color:#2563eb;
margin-bottom:10px;
}

.inquiry-card p{
margin:8px 0;
}

.status{
display:inline-block;
margin-top:10px;
padding:6px 14px;
border-radius:20px;
color:white;
}

.new{
background:#f59e0b;
}

.reviewed{
background:#3b82f6;
}

.closed{
background:#10b981;
}

.action-btn{
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
margin-top:15px;
margin-right:10px;
color:white;
}

.delete-btn{
background:#ef4444;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Kalam Hub</h2>

<a href="dashboard.html">Dashboard</a>
<a href="projects.html">Projects</a>
<a href="customers.html">Customers</a>
<a href="inquiries.html">Inquiries</a>
<a href="payments.html">Payments</a>
<a href="../index.html">Website</a>
<a href="#" onclick="logout()">Logout</a>

</div>

<div class="main">

<div class="header">
<h1>Customer Inquiries</h1>
</div>

<div id="inquiriesContainer">
<p>Loading inquiries...</p>
</div>

</div>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "login.html";
}
const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbyCkmRwo8kA8TyALX50UKMnOCorLwObJ27a5XCC0-EAEoDNEv1sW0wZwKwE70UNzBOZOA/exec";

async function loadInquiries(){

try{

const response =
await fetch(
WEB_APP_URL +
"?action=getInquiries"
);

const data =
await response.json();

const container =
document.getElementById(
"inquiriesContainer"
);

container.innerHTML = "";

if(data.length === 0){

container.innerHTML =
"<p>No inquiries found.</p>";

return;

}

data.forEach(row => {

let statusClass = "new";

if(
String(row[7]).toLowerCase() ===
"reviewed"
){
statusClass = "reviewed";
}

if(
String(row[7]).toLowerCase() ===
"closed"
){
statusClass = "closed";
}

const card =
document.createElement("div");

card.className =
"inquiry-card";

card.innerHTML = `

<h3>${row[2]}</h3>

<p>
<strong>Email:</strong>
${row[3]}
</p>

<p>
<strong>Phone:</strong>
${row[4]}
</p>

<p>
<strong>Project:</strong>
${row[5]}
</p>

<p>
<strong>Message:</strong>
${row[6]}
</p>

<span class="status ${statusClass}">
${row[7] || "New"}
</span>

<br>

<button
class="action-btn delete-btn"
onclick="deleteInquiry('${row[0]}')">
Delete
</button>

`;

container.appendChild(card);

});

}
catch(error){

console.error(error);

document
.getElementById(
"inquiriesContainer"
)
.innerHTML =
"<p>Failed to load inquiries.</p>";

}

}

async function deleteInquiry(id){

  if(!confirm("Delete Inquiry?"))
    return;

  const response =
  await fetch(
    WEB_APP_URL,
    {
      method:"POST",
      body:JSON.stringify({
        action:"deleteInquiry",
        inquiryId:id
      })
    }
  );

  const result =
  await response.json();

  if(result.success){

    alert("Inquiry Deleted");

    loadInquiries();

  }else{

    alert("Delete Failed");

  }

}


function logout(){

    localStorage.removeItem("loggedIn");

    window.location.href = "login.html";

}

loadInquiries();

</script>

</body>

</html>
