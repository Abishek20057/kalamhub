<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Management | Kalam Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/responsive.css">
<link rel="stylesheet" href="../css/animations.css">

<style>

.container{
padding:120px 8%;
}

.page-title{
margin-bottom:30px;
}

.page-title h1{
color:#2563eb;
}

.form-box{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
margin-bottom:40px;
}

.form-box input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
}

.form-box button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:700;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

th{
background:#2563eb;
color:white;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

.action-btn{
padding:8px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
color:white;
margin-right:5px;
}

.edit-btn{
background:#22c55e;
}

.delete-btn{
background:#ef4444;
}

@media(max-width:768px){

table{
display:block;
overflow-x:auto;
}

}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo">

<img src="../assets/images/kalam-hub-logo.jpeg">
alt="Kalam Hub">

<span>Kalam Hub</span>

</div>

<ul class="nav-links">

<li><a href="admin-dashboard.html">Dashboard</a></li>
<li><a href="projects-admin.html">Projects</a></li>
<li><a href="customers-admin.html">Customers</a></li>

</ul>

</nav>

<div class="container">

<div class="page-title">

<h1>Customer Management</h1>

<p>
Manage customer records and project clients.
</p>

</div>

<div class="form-box">

<input
type="text"
id="customerName"
placeholder="Customer Name">

<input
type="email"
id="customerEmail"
placeholder="Customer Email">

<input
type="tel"
id="customerPhone"
placeholder="Customer Phone">

<button onclick="addCustomer()">
Add Customer
</button>

</div>

<table>

<thead>

<tr>

<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Action</th>

</tr>

</thead>

<tbody id="customersTable">

<tr>

<td colspan="4">
Loading Customers...
</td>

</tr>

</tbody>

</table>

</div>

<script src="js/customers-admin.js"></script>
<script src="../js/logout.js"></script>
</body>

</html>
