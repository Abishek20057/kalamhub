<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login | Kalam Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/responsive.css">
<link rel="stylesheet" href="../css/animations.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#2563eb
);
}

.login-box{

width:100%;
max-width:450px;

background:white;

padding:40px;

border-radius:25px;

box-shadow:
0 20px 50px rgba(0,0,0,.2);

text-align:center;

}

.logo{

width:100px;
height:100px;
object-fit:cover;
border-radius:50%;
margin-bottom:20px;
border:4px solid #2563eb;

}

h1{

color:#2563eb;
margin-bottom:10px;

}

.subtitle{

color:#64748b;
margin-bottom:30px;

}

input{

width:100%;
padding:15px;
margin-bottom:15px;

border:1px solid #dbeafe;

border-radius:12px;

font-size:16px;

}

button{

width:100%;
padding:15px;

border:none;
border-radius:12px;

background:#2563eb;
color:white;

font-size:16px;
font-weight:700;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1d4ed8;

}

.error{

color:red;
margin-top:15px;
display:none;

}

</style>

</head>

<body>

<div class="login-box">

<img src="../assets/images/kalam-hub-logo.jpeg">
alt="Kalam Hub"
class="logo">

<h1>Admin Login</h1>

<p class="subtitle">

Kalam Hub Management System

</p>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">

Login

</button>

<p
id="error"
class="error">

Invalid Username or Password

</p>

</div>

<script>

function login(){

const username =
document.getElementById(
"username"
).value;

const password =
document.getElementById(
"password"
).value;

/*
CHANGE THESE
*/

const ADMIN_USER =
"admin";

const ADMIN_PASS =
"kalamhub123";

if(
username === ADMIN_USER &&
password === ADMIN_PASS
){

localStorage.setItem(
"isAdminLoggedIn",
"true"
);

window.location.href =
"admin-dashboard.html";

}
else{

document.getElementById(
"error"
).style.display =
"block";

}

}

if(
localStorage.getItem(
"isAdminLoggedIn"
) === "true"
){

window.location.href =
"admin-dashboard.html";

}

</script>
<script src="../js/logout.js"></script>
</body>

</html>
