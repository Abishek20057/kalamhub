<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kalam Hub Admin Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                135deg,
                #2563eb,
                #0f172a
            );
        }

        .login-box{

            width:400px;
            background:white;
            padding:40px;
            border-radius:20px;

            box-shadow:
            0 15px 40px rgba(0,0,0,0.2);

        }

        .login-box h1{

            text-align:center;
            margin-bottom:10px;
            color:#2563eb;

        }

        .login-box p{

            text-align:center;
            margin-bottom:30px;
            color:#666;

        }

        .login-box input{

            width:100%;
            padding:14px;

            margin-bottom:15px;

            border:1px solid #ddd;
            border-radius:10px;

        }

        .login-btn{

            width:100%;
            padding:14px;

            border:none;
            border-radius:10px;

            background:#2563eb;
            color:white;

            font-size:16px;
            cursor:pointer;

        }

        .login-btn:hover{

            background:#1d4ed8;

        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>Kalam Hub</h1>

        <p>Admin Dashboard Login</p>

        <form id="loginForm">

            <input
                type="text"
                id="username"
                placeholder="Username"
                required>

            <input
                type="password"
                id="password"
                placeholder="Password"
                required>

            <button
                type="submit"
                class="login-btn">

                Login

            </button>

        </form>

    </div>

<script>

document
.getElementById("loginForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    if(
    username === "admin"
    &&
    password === "kalamhub123"
){

    localStorage.setItem(
        "loggedIn",
        "true"
    );

    window.location.href =
    "dashboard.html";

}
    else{

        alert(
        "Invalid Username or Password"
        );

    }

});

if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "login.html";
}
</script>

</body>

</html>
