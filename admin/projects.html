<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projects Management | Kalam Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fb;
}

.sidebar{
position:fixed;
width:250px;
height:100vh;
background:#0f172a;
padding:30px 20px;
color:white;
}

.sidebar h2{
text-align:center;
margin-bottom:40px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px;
margin:10px 0;
border-radius:10px;
}

.sidebar a:hover{
background:#2563eb;
}

.main{
margin-left:250px;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.add-btn{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
}

.project-form{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.project-form input,
.project-form select{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
}

.project-form button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
}

.table-box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:15px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#2563eb;
color:white;
}

.status{
padding:5px 12px;
border-radius:20px;
color:white;
font-size:13px;
}

.pending{
background:#f59e0b;
}

.progress{
background:#3b82f6;
}

.completed{
background:#10b981;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Kalam Hub</h2>

<a href="dashboard.html">Dashboard</a>
<a href="projects.html">Projects</a>
<a href="customers.html">Customers</a>
<a href="inquiries.html">Inquiries</a>
<a href="payments.html">Payments</a>
<a href="../index.html">Website</a>
<a href="#" onclick="logout()">Logout</a>

</div>

<div class="main">

<div class="header">
<h1>Projects Management</h1>
</div>

<div class="project-form">

<input type="text" id="projectName" placeholder="Project Name">

<input type="text" id="customerName" placeholder="Customer Name">

<input type="number" id="projectCost" placeholder="Project Cost">

<select id="projectStatus">
<option>Pending</option>
<option>In Progress</option>
<option>Completed</option>
</select>

<button onclick="saveProject()">
Save Project
</button>

</div>

<div class="table-box">

<table>

<thead>

<tr>
<th>ID</th>
<th>Project</th>
<th>Customer</th>
<th>Cost</th>
<th>Status</th>
<th>Date</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="projectsTable">

</tbody>

</table>

</div>

</div>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbyCkmRwo8kA8TyALX50UKMnOCorLwObJ27a5XCC0-EAEoDNEv1sW0wZwKwE70UNzBOZOA/exec";

window.onload = () => {
    loadProjects();
};

async function loadProjects(){

    try{

        const response =
        await fetch(
            WEB_APP_URL + "?action=getProjects"
        );

        const projects =
        await response.json();

        let html = "";

        projects.forEach(project => {

            let statusClass = "pending";

            if(project[4] === "Completed"){
                statusClass = "completed";
            }
            else if(project[4] === "In Progress"){
                statusClass = "progress";
            }

            html += `
            <tr>

                <td>${project[0]}</td>
                <td>${project[1]}</td>
                <td>${project[2]}</td>
                <td>₹${project[3]}</td>

                <td>
                    <span class="status ${statusClass}">
                        ${project[4]}
                    </span>
                </td>

                <td>${project[5]}</td>

                <td>

                    <button onclick="editProject('${project[0]}')">
                        Edit
                    </button>

                    <button onclick="deleteProject('${project[0]}')">
                        Delete
                    </button>

                </td>

            </tr>
            `;
        });

        document.getElementById("projectsTable").innerHTML = html;

    }
    catch(error){
        console.error(error);
    }
}

async function saveProject(){

    const projectName =
    document.getElementById("projectName").value;

    const customerName =
    document.getElementById("customerName").value;

    const projectCost =
    document.getElementById("projectCost").value;

    const projectStatus =
    document.getElementById("projectStatus").value;

    if(
        !projectName ||
        !customerName ||
        !projectCost
    ){
        alert("Fill all fields");
        return;
    }

    const response =
    await fetch(
        WEB_APP_URL,
        {
            method:"POST",
            body:JSON.stringify({

                action:"addProject",

                projectName,
                customerName,
                projectCost,
                projectStatus

            })
        }
    );

    const result =
    await response.json();

    if(result.success){

        alert("Project Saved");

        document.getElementById("projectName").value = "";
        document.getElementById("customerName").value = "";
        document.getElementById("projectCost").value = "";

        loadProjects();

    }
    else{

        alert("Save Failed");

    }

}

async function editProject(id){

    const newName =
    prompt("Enter New Project Name");

    if(!newName) return;

    const response =
    await fetch(
        WEB_APP_URL,
        {
            method:"POST",
            body:JSON.stringify({

                action:"editProject",
                projectId:id,
                projectName:newName

            })
        }
    );

    const result =
    await response.json();

    if(result.success){

        alert("Project Updated");
        loadProjects();

    }else{

        alert("Update Failed");

    }

}

async function deleteProject(id){

    if(!confirm("Delete this project?"))
        return;

    const response =
    await fetch(
        WEB_APP_URL,
        {
            method:"POST",
            body:JSON.stringify({

                action:"deleteProject",
                projectId:id

            })
        }
    );

    const result =
    await response.json();

    if(result.success){

        alert("Project Deleted");
        loadProjects();

    }
    else{

        alert("Delete Failed");

    }

}
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "login.html";
}
</script>
</body>
</html>
