<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payments | Kalam Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f7fb;
}

.sidebar{
    position:fixed;
    width:250px;
    height:100vh;
    background:#0f172a;
    color:white;
    padding:30px 20px;
}

.sidebar h2{
    text-align:center;
    margin-bottom:40px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
}

.sidebar a:hover{
    background:#2563eb;
}

.main{
    margin-left:250px;
    padding:30px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.card h3{
    color:#666;
    margin-bottom:10px;
}

.card h1{
    color:#2563eb;
}

.table-box{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:15px;
    border-bottom:1px solid #eee;
    text-align:left;
}

th{
    background:#2563eb;
    color:white;
}

.paid{
    color:#10b981;
    font-weight:600;
}

.pending{
    color:#f59e0b;
    font-weight:600;
}
.edit-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

.delete-btn{
    background:#ef4444;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    margin-left:5px;
}

</style>

</head>

<body>

<div class="main">

    <h1>Payments Management</h1>

    <br>

    <div class="cards">

        <div class="card">
            <h3>Total Revenue</h3>
            <h1 id="totalRevenue">₹0</h1>
        </div>

        <div class="card">
            <h3>Paid Amount</h3>
            <h1 id="paidAmount">₹0</h1>
        </div>

        <div class="card">
            <h3>Pending Amount</h3>
            <h1 id="pendingAmount">₹0</h1>
        </div>
        <div class="sidebar">

    <h2>Kalam Hub</h2>

    <a href="dashboard.html">Dashboard</a>
    <a href="projects.html">Projects</a>
    <a href="customers.html">Customers</a>
    <a href="inquiries.html">Inquiries</a>
    <a href="payments.html">Payments</a>
    <a href="../index.html">Website</a>
    <a href="#" onclick="logout()">Logout</a>

</div>
    </div>

    <div class="table-box">

        <table>

            <thead>
                <tr>
                    <th>Payment ID</th>
                    <th>Customer</th>
                    <th>Project</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="paymentsTable">
            </tbody>

        </table>

    </div>

</div>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbyCkmRwo8kA8TyALX50UKMnOCorLwObJ27a5XCC0-EAEoDNEv1sW0wZwKwE70UNzBOZOA/exec";

async function loadPayments(){

    try{

        const response =
        await fetch(
            WEB_APP_URL +
            "?action=getPayments"
        );

        const payments =
        await response.json();

        let totalRevenue = 0;
        let paidAmount = 0;
        let pendingAmount = 0;

        let html = "";

        payments.forEach(payment => {

            const amount =
            Number(payment[3]) || 0;

            totalRevenue += amount;

            if(
                String(payment[4])
                .toLowerCase() === "paid"
            ){
                paidAmount += amount;
            }else{
                pendingAmount += amount;
            }

           html += `
<tr>
    <td>${payment[0]}</td>
    <td>${payment[1]}</td>
    <td>${payment[2]}</td>
    <td>₹${amount}</td>

    <td class="${
      String(payment[4]).toLowerCase() === "paid"
      ? "paid"
      : "pending"
    }">
      ${payment[4]}
    </td>

    <td>
      <button
        class="edit-btn"
        onclick="editPayment('${payment[0]}')">
        Edit
      </button>

      <button
        class="delete-btn"
        onclick="deletePayment('${payment[0]}')">
        Delete
      </button>
    </td>

</tr>
`;
        });

        document.getElementById(
            "paymentsTable"
        ).innerHTML = html;

        document.getElementById(
            "totalRevenue"
        ).innerHTML =
        "₹" + totalRevenue;

        document.getElementById(
            "paidAmount"
        ).innerHTML =
        "₹" + paidAmount;

        document.getElementById(
            "pendingAmount"
        ).innerHTML =
        "₹" + pendingAmount;

    }

    catch(error){

        console.error(error);

        document.getElementById(
            "paymentsTable"
        ).innerHTML =
        "<tr><td colspan='5'>Failed to load payments</td></tr>";
    }
}

loadPayments();
async function editPayment(id){

    const newStatus =
    prompt(
      "Enter Status (Paid/Pending)"
    );

    if(!newStatus) return;

    const response =
    await fetch(
      WEB_APP_URL,
      {
        method:"POST",
        body:JSON.stringify({

          action:"editPayment",
          paymentId:id,
          status:newStatus

        })
      }
    );

    const result =
    await response.json();

    if(result.success){

        alert("Payment Updated");
        loadPayments();
    }
}


async function deletePayment(id){

    if(
      !confirm("Delete Payment?")
    ) return;

    const response =
    await fetch(
      WEB_APP_URL,
      {
        method:"POST",
        body:JSON.stringify({

          action:"deletePayment",
          paymentId:id

        })
      }
    );

    const result =
    await response.json();

    if(result.success){

        alert("Payment Deleted");
        loadPayments();
    }
}
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "login.html";
}
</script>

</body>
</html>
