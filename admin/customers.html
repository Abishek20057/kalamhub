<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customers | Kalam Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/responsive.css">
<link rel="stylesheet" href="../css/animations.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fb;
}

.sidebar{
position:fixed;
width:250px;
height:100vh;
background:#0f172a;
padding:30px 20px;
color:white;
}

.sidebar h2{
text-align:center;
margin-bottom:40px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px;
margin:10px 0;
border-radius:10px;
}

.sidebar a:hover{
background:#2563eb;
}

.main{
margin-left:250px;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.table-box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:15px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#2563eb;
color:white;
}

.status-paid{
color:#10b981;
font-weight:600;
}

.status-pending{
color:#f59e0b;
font-weight:600;
}

.action-btn{
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin-right:5px;
color:white;
}

.edit{
background:#3b82f6;
}

.delete{
background:#ef4444;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Kalam Hub</h2>

<a href="dashboard.html">Dashboard</a>
<a href="projects.html">Projects</a>
<a href="customers.html">Customers</a>
<a href="inquiries.html">Inquiries</a>
<a href="payments.html">Payments</a>
<a href="../index.html">Website</a>
<a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">

<div class="header">
<h1>Customers</h1>
</div>

<div class="table-box">

<table>

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Project</th>
<th>Amount</th>
<th>Status</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="customersTable">

</tbody>

</table>

</div>

</div>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbyCkmRwo8kA8TyALX50UKMnOCorLwObJ27a5XCC0-EAEoDNEv1sW0wZwKwE70UNzBOZOA/exec";

window.onload = () => {
  loadCustomers();
};

async function loadCustomers(){

try{

const response =
await fetch(
WEB_APP_URL +
"?action=getCustomers"
);

const customers =
await response.json();

let html = "";
if(customers.length === 0){

    html = `
    <tr>
        <td colspan="7">
            No Customers Found
        </td>
    </tr>
    `;

}

customers.forEach(customer => {

const statusClass =
customer[5]?.toLowerCase() === "paid"
? "status-paid"
: "status-pending";

html += `
<tr>

<td>${customer[0]}</td>

<td>${customer[1]}</td>

<td>${customer[2]}</td>

<td>${customer[3]}</td>

<td>₹${customer[4] || 0}</td>

<td class="${statusClass}">
${customer[5]}
</td>

<td>

<button
class="action-btn edit"
onclick="editCustomer('${customer[0]}')">
Edit
</button>

<button
class="action-btn delete"
onclick="deleteCustomer('${customer[0]}')">
Delete
</button>

</td>

</tr>
`;

});

document.getElementById(
"customersTable"
).innerHTML = html;

}
catch(error){

console.error(error);

document.getElementById(
"customersTable"
).innerHTML =
`
<tr>
<td colspan="7">
Failed to load customers
</td>
</tr>
`;

}

}

/* ADD HERE */

async function editCustomer(id){

  const newName =
  prompt("Enter New Customer Name");

  if(!newName) return;

  const response =
  await fetch(
    WEB_APP_URL,
    {
      method:"POST",
      body:JSON.stringify({

        action:"editCustomer",
        customerId:id,
        customerName:newName

      })
    }
  );

  const result =
  await response.json();

  if(result.success){

    alert("Customer Updated");
    loadCustomers();

  }

}

async function deleteCustomer(id){

  if(!confirm("Delete Customer?"))
    return;

  const response =
  await fetch(
    WEB_APP_URL,
    {
      method:"POST",
      body:JSON.stringify({

        action:"deleteCustomer",
        customerId:id

      })
    }
  );

  const result =
  await response.json();

  if(result.success){

    alert("Customer Deleted");
    loadCustomers();

  }

}
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "login.html";
}
function logout(){

    localStorage.removeItem("loggedIn");

    window.location.href = "login.html";

}
</script>
